		ipropsapiCtrl.HttpPort		= 80;

		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 1;

		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
		
		// Clean Log Area		Added Ver5.0.1.0
		document.getElementById("EventLog").value = "";
		document.getElementById("RetValue").value = "";
		document.getElementById("TransFile").value = "C:\\temp\\test.bmp";

		RetValue.value = ipropsapiCtrl.Open();
		
		lChannel = 1;
		lBlockmode = 0;

		//Setup to StartLive
		lChannel = 1;
		lBlockmode = 0;
		if(RetValue.value > -1){
			RetValue.value = ipropsapiCtrl.PlayLive(lChannel, lBlockmode)
			if(RetValue.value > -1){
				PlayStatus = 1;
			}
		}
		else{
			return ;
		}

	}
	
	/****************************************************************
	* Function Name        : Unload
	* Overview             : 
	****************************************************************/
	function Unload()
	{
		if(PlayStatus == 1){
			//Stop Live
			lCommand = 1;
			lSpeed = 1;
			lBlockmode = 0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lSpeed, lBlockmode);

			//Close connection to the device
			ipropsapiCtrl.Close();

			//Clear Image
			ipropsapiCtrl.ClearImage();
		}

		//Set properties for event
		ipropsapiCtrl.OnErrorEnable			= 0;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 0;

		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
	}

	}

	/****************************************************************
	* Function Name        : DrawBox						Modefied Ver5.0.1.0
	* Overview             : Draw Box
	****************************************************************/
	function DrawBox()
	{
		lColor = 255;

		lxTopLeft = 200;
		lyTopLeft = 200;
		lxBottomRight = 300;
		lyBottomRight = 300;

		if(drawBox.checked){
			//Display Box

			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] BoxOperation (ON):" + Ret.toString());
		}
		else{
			//Not display Box
			lId = 1;
			lCommand = 0;
			Ret = ipropsapiCtrl.BoxOperationEx(lId, lCommand, lColor, lSize, lxTopLeft, lyTopLeft, lxBottomRight, lyBottomRight, lTrans);
			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] BoxOperation (OFF):" + Ret.toString());
		}
	}
	/****************************************************************
	* Function Name        : BMPDraw						Added Ver5.0.1.0
	* Overview             : Transparent bitmap image processing
	****************************************************************/
	function BMPDraw()
	{
		Id = 1;		// ID for management
		XPos = 320;	// X position of displayed transparent
		YPos = 240;	// Y position of displayed transparent
		if (document.getElementById("BmpDraw").checked) {
			// Transparent bitmap
			FileName = document.getElementById("TransFile").value;
			Command = 1;			// Bitmap display
			MaskColor = 0xFF00FF;	// bitmap's masked color
			Trans = 0x7F;			// Transmittance
			Ret = ipropsapiCtrl.BitmapOperationEx(Id, Command, FileName, XPos, YPos, MaskColor, Trans);
			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] BitmapOperationEx (ON," + FileName + "):" + Ret.toString());
		}
		else {
			// Not transparent bitmap
			FileName = "";
			Command = 0;			// Bitmap non display
			MaskColor = 0x00;		// Bitmap's masked color
			Trans = 0x7F;			// Transmittance
			Ret = ipropsapiCtrl.BitmapOperationEx(Id, Command, FileName, 0, 0, MaskColor, Trans);
			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] BitmapOperationEx (OFF):" + Ret.toString());
		}
	}
