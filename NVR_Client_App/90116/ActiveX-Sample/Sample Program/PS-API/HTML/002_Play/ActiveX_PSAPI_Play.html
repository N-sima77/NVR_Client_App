	/****************************************************************

	function PlayBack()
	{
		if(PlayStatus == 0){
			//Connect to the device
			Ret = ipropsapiCtrl.Open();
			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] Open:" + Ret.toString());
			if(Ret > -1){
				//Start PlayBack
				lChannel = 1;
				lBlockmode = 0;
				var chDate = "2010/07/01 00:00:00";
				Ret = ipropsapiCtrl.Play(lChannel, chDate, lBlockmode);
				document.getElementById("RetValue").value = Ret.toString();
				Logging("[Function] Play:" + Ret.toString());
				if(Ret == 0){
					PlayStatus = 1;
				}
			}
		}else{
			//Re-Start PlayBack
			lChannel = 1;
			lCommand = 4;
			lSpeed = 1;
			lBlockmode = 0;
			Ret = ipropsapiCtrl.PlayControl(lCommand, lSpeed, lBlockmode);
			document.getElementById("RetValue").value = Ret.toString();
			Logging("[Function] PlayControl(playback):" + Ret.toString());
		}
	}
