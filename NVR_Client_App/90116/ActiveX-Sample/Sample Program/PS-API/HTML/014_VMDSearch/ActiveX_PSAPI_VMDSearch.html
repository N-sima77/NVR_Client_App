		ipropsapiCtrl.IPAddr		= "192.168.0.250";
		ipropsapiCtrl.DeviceType	= 1;
		ipropsapiCtrl.HttpPort		= 80;
		ipropsapiCtrl.UserName		= "ADMIN";
		ipropsapiCtrl.Password		= "12345";

		ipropsapiCtrl.OnErrorEnable			= 1;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 1;
		ipropsapiCtrl.OnImageRefreshEnable	= 0;
		ipropsapiCtrl.OnRecordStatusEnable	= 0;
		ipropsapiCtrl.OnOpStatusEnable		= 0;
		ipropsapiCtrl.OnAlmStatusEnable		= 0;
		
		ipropsapiCtrl.OnRecStatusCBEnable	= 0;
		ipropsapiCtrl.OnSearchCBEnable		= 0;
		ipropsapiCtrl.OnSearchExCBEnable	= 1;
		ipropsapiCtrl.OnPlayStatusCBEnable	= 0;
		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;

	/****************************************************************
	* Function Name   : ShowResult
	* Overview        : Output list Search result 
	****************************************************************/
	function ShowResult()
	{
		//Set Search Result to list
		var strInfo = ipropsapiCtrl.SearchResult;

		Startbuf = 0;
		Endbuf = 0;
		m_SearchRet.length = 0;
		while(1){
			
			Endbuf = strInfo.indexOf("\r\n",Startbuf);
			if(Startbuf == -1 || Startbuf >= strInfo.length){
				break;
			}

			strRec = strInfo.substr(Startbuf,Endbuf-Startbuf+1);

			//output format [No, ch, startTD, EndTd, Kind, Audio]
			m_SearchRet.length++;
			if(m_SearchRet.length < 10){
				strRec = "0" + m_SearchRet.length + ", " + strRec;
			}else{
				strRec = "" + m_SearchRet.length + ", " + strRec;
			}
			Startbuf = Endbuf + 2;
			
			//output listbox
			m_SearchRet.options[m_SearchRet.length-1].text = strRec;
		}
	}

	/****************************************************************
	* Function Name   : ShowResultEx
	* Overview        : Output list SearchEx/VMDSearchEx result 
	****************************************************************/
	function ShowResultEx()
	{
		//Set Search Result to list
		var strInfo = ipropsapiCtrl.SearchResultEx;

		Startbuf = 0;
		Endbuf = 0;
		m_SearchRet.length = 0;
		while(1){
			
			Endbuf = strInfo.indexOf("\r\n",Startbuf);
			if(Startbuf == -1 || Startbuf >= strInfo.length){
				break;
			}

			strRec = strInfo.substr(Startbuf,Endbuf-Startbuf+1);

			//output format [No, ch, startTD, EndTd, Kind, Audio, Time zone, Time mode]
			m_SearchRet.length++;
			if(m_SearchRet.length < 10){
				strRec = "0" + m_SearchRet.length + ", " + strRec;
			}else{
				strRec = "" + m_SearchRet.length + ", " + strRec;
			}
			Startbuf = Endbuf + 2;
			
			//output listbox
			m_SearchRet.options[m_SearchRet.length-1].text = strRec;
		}
	}

	/****************************************************************
	 * Function			: Call_PlayStop
	 * Outline			: 
	****************************************************************/
	function Call_PlayStop()
	{
		//-----------------------------------------------------
		//Stop Play
		//-----------------------------------------------------
		if(g_lPlayStatus == 1){
			lCommand = 0
			lSpeed = 1
			lBlockmode = 0
			RetValue.value = ipropsapiCtrl.PlayControl(0, 1, lBlockmode);
			ipropsapiCtrl.ClearImage();
			g_lPlayStatus = 0;
		}
	}

	/****************************************************************
	 * Function			: Call_ClearBox
	 * Outline			: 
	****************************************************************/
	function Call_ClearBox()
	{
		lId = 1;
		lCommand = 1;
		lColor = 16777215;
		lSize = 3;
		RetValue.value = ipropsapiCtrl.BoxOperation(lId, lCommand, lColor, lSize, 0, 0, 1, 1);
		
		gxPosTopLeft = 0;
		gyPosTopLeft = 0;
		gxPosBottomRight = 0;
		gyPosBottomRight = 0;
	}

	/****************************************************************
	 * Function			: VMDSearch_ASync
	 * Outline			: 
	****************************************************************/
	function VMDSearch_ASync()
	{
		Call_PlayStop();

		//-----------------------------------------------------
		//Set properties
		//-----------------------------------------------------
		lChannel = eval( Channel.value );

		//Set TimeDate
		csStartTD = m_sYear.value + "/" + m_sMonth.value + "/" + m_sDay.value + " " + 
				m_sHour.value + ":" + m_sMin.value + ":" + m_sSec.value;

		//Set TimeDate
		csEndTD = m_eYear.value + "/" + m_eMonth.value + "/" + m_eDay.value + " " + 
				m_eHour.value + ":" + m_eMin.value + ":" + m_eSec.value;

		lmask = 1;
		laSensitivity = 1;
		laxTopLeft = gxPosTopLeft;
		layTopLeft = gyPosTopLeft;
		laxBottomRight = gxPosBottomRight;
		layBottomRight = gyPosBottomRight;
		lbSensitivity = 0;
		lbxTopLeft = 0;
		lbyTopLeft = 0;
		lbxBottomRight = 0;
		lbyBottomRight = 0;
		lcSensitivity = 0;
		lcxTopLeft = 0;
		lcyTopLeft = 0;
		lcxBottomRight = 0;
		lcyBottomRight = 0;
		ldSensitivity = 0;
		ldxTopLeft = 0;
		ldyTopLeft = 0;
		ldxBottomRight = 0;
		ldyBottomRight = 0;
		limageWidth = 320;
		limageHeight = 240;
		lBlockmode = 1;

		//-----------------------------------------------------
		//VMDSearchEx
		//-----------------------------------------------------
		RetValue.value = ipropsapiCtrl.VMDSearchEx(lChannel, csStartTD, csEndTD, lmask, 
		                                           laSensitivity,laxTopLeft,layTopLeft,laxBottomRight,layBottomRight,
		                                           lbSensitivity,lbxTopLeft,lbyTopLeft,lbxBottomRight,lbyBottomRight,
		                                           lcSensitivity,lcxTopLeft,lcyTopLeft,lcxBottomRight,lcyBottomRight,
		                                           ldSensitivity,ldxTopLeft,ldyTopLeft,ldxBottomRight,ldyBottomRight,
		                                           limageWidth,limageHeight,lBlockmode);
	}

	/****************************************************************
	 * Function			: Search_Cancel
	 * Outline			: 
	 ***************************************************************/
	function Search_Cancel()
	{
		//-----------------------------------------------------
		//SearchCancel
		//-----------------------------------------------------
		RetValue.value = ipropsapiCtrl.SearchCancel();
	}

	/****************************************************************
	* Function Name        : DblclkSearchRet
	* Overview             : play for search result
	****************************************************************/
	function DblclkSearchRet() 
	{
		//-----------------------------------------------------
		//Define variables
		//-----------------------------------------------------
		lchannel=	0;
		Startbuf=	0;
		Nextbuf	=	0;
		Endbuf	=	0;
		var csListbuf = "";
		csTimeDT = "";

		//-----------------------------------------------------
		//Stop Play
		//-----------------------------------------------------
		Call_PlayStop();
		Call_ClearBox();
		
		//-----------------------------------------------------
		//Get listbox data
		//-----------------------------------------------------
		if(m_SearchRet.options[m_SearchRet.selectedIndex].text != ""){
			csListbuf = m_SearchRet.options[m_SearchRet.selectedIndex].text;

			//No, ch
			Startbuf = csListbuf.indexOf(",", 0);
			
			//ch, startTD
			Nextbuf = csListbuf.indexOf(",", Startbuf+2);
			
			//startTD, EndTD
			Endbuf = csListbuf.indexOf(",", Nextbuf+1);

			//get ch
			lchannel = eval( csListbuf.substr(Startbuf+2, Nextbuf-(Startbuf+2)) );
			
			//get timedate
			csTimeDT = csListbuf.substr(Nextbuf+1, Endbuf-(Nextbuf+1));

			//-----------------------------------------------------
			//Start Play
			//-----------------------------------------------------
			RetValue.value = ipropsapiCtrl.Play(lchannel, csTimeDT,	lBlockmode);

			if ( RetValue.value == 0){
				g_lPlayStatus = 1;
			}
		}
	}

<SCRIPT language="JavaScript">
	/****************************************************************
	* Function Name        : MouseDown
	* Overview             : MouseDown event
	 ****************************************************************/
	function ipropsapiCtrl::MouseDown(Button, Shift, x, y)
	{
		gxPosTopLeft = x;
		gyPosTopLeft = y;
		
		strLog = EventLog.value
		if ( strLog != ""){
			strLog = strLog + "\n"
		}
		EventLog.value = strLog + "[MouseDown] Position [X:"+ x + " Y:" + y + "]"
	}
	/****************************************************************
	* Function Name        : MouseUp
	* Overview             : MouseUp event
	 ****************************************************************/
	function ipropsapiCtrl::MouseUp(Button, Shift, x, y)
	{
		gxPosBottomRight = x;
		gyPosBottomRight = y;

		strLog = EventLog.value
		if ( strLog != ""){
			strLog = strLog + "\n"
		}
		EventLog.value = strLog + "[MouseUp] Position [X:"+ x + " Y:" + y + "]"
				
		if( gxPosTopLeft > gxPosBottomRight){
			lxTmpTL = gxPosBottomRight;
			lxTmpBR = gxPosTopLeft;
		}else{
			lxTmpTL = gxPosTopLeft;
			lxTmpBR = gxPosBottomRight;
		}
		
		if( gyPosTopLeft > gyPosBottomRight){
			lyTmpTL = gyPosBottomRight;
			lyTmpBR = gyPosTopLeft;
		}else{
			lyTmpTL = gyPosTopLeft;
			lyTmpBR = gyPosBottomRight;
		}
		
		// Draw Box
		lId = 1;
		lCommand = 1;
		lColor = 16777215;
		lSize = 3;
		RetValue.value = ipropsapiCtrl.BoxOperation(lId, lCommand, lColor, lSize, lxTmpTL, lyTmpTL, lxTmpBR, lyTmpBR);

		gxPosTopLeft = lxTmpTL;
		gyPosTopLeft = lyTmpTL;
		gxPosBottomRight = lxTmpBR;
		gyPosBottomRight = lyTmpBR;
	}
</SCRIPT>
