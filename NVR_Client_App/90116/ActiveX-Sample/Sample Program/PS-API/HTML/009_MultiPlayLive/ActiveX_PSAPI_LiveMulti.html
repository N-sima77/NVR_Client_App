<SCRIPT language="JavaScript">
	/****************************************************************
	 * Function			: OnStartLive
	 * Outline			: 
	 ***************************************************************/
	function OnStartLive()
	{
		if(PlayStatus == 0){
			//Connect to the device
			Ret.value = ipropsapiCtrl.Open();

			if(Ret.value > -1)
			{
				//StartLive
				lChannel    =   1;
				lBlocking   =   0;
				RetValue.value = ipropsapiCtrl.PlayLive(lChannel,lBlocking);

				if(RetValue.value != 0)
				{
					//Status:Stop
					ipropsapiCtrl.Close();
				}
				else{
					//Connect to the device with UID
					lRet = ipropsapiCtrl2.Connect(ipropsapiCtrl.UID);
					
					if(lRet > -1)
					{
						//StartLive
						lChannel = 2;
						lBlocking   =   0;
						RetValue2.value = ipropsapiCtrl2.PlayLive(lChannel,lBlocking);
						
						if(RetValue2.value != 0)
						{
							//Status:Stop
							ipropsapiCtrl2.Disconnect();
						}
					}
					PlayStatus = 1;
				}
			}
		}
	}

	/****************************************************************
	 * Function			: OnStopLive
	 * Outline			: 
	****************************************************************/
	function OnStopLive()
	{	
		if(PlayStatus == 1)
		{
			//Stop Live
			lCommand	=	1;
			lSpeed		=	0;
			lBlocking	=	0;
			ipropsapiCtrl.PlayControl(lCommand,lSpeed,lBlocking);
			ipropsapiCtrl2.PlayControl(lCommand,lSpeed,lBlocking);

			//Close connection to the device
			ipropsapiCtrl2.Close();
			ipropsapiCtrl.Close()

			//Clear Image
			ipropsapiCtrl2.ClearImage();
			ipropsapiCtrl.ClearImage();

			PlayStatus = 0;
		}else{
			alert("No live.");
		}
	}
