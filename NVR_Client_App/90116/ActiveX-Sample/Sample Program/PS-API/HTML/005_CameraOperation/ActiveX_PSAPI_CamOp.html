	/****************************************************************

	var PlayStatus = 0;

	/****************************************************************
	* Function Name        : Load
	* Overview             : Set properties
	****************************************************************/
	function Load()
	{
		//Set properties to connect the device
		ipropsapiCtrl.IPAddr		= "192.168.0.10";
		ipropsapiCtrl.DeviceType	= 2;
		ipropsapiCtrl.HttpPort		= 80;
		ipropsapiCtrl.UserName		= "admin";
		ipropsapiCtrl.Password		= "12345";
		
		//Set properties for display area
		ipropsapiCtrl.StreamFormat		= 1;
		ipropsapiCtrl.JPEGResolution	= 640;
		ipropsapiCtrl.MPEG4Resolution	= 640;
		ipropsapiCtrl.H264Resolution	= 640;
		
		//Set properties for event
		ipropsapiCtrl.OnErrorEnable			= 1;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 1;
		ipropsapiCtrl.OnImageRefreshEnable	= 0;
		ipropsapiCtrl.OnRecordStatusEnable	= 0;
		ipropsapiCtrl.OnOpStatusEnable		= 1;
		ipropsapiCtrl.OnAlmStatusEnable		= 0;
		
		ipropsapiCtrl.OnRecStatusCBEnable	= 0;
		ipropsapiCtrl.OnSearchCBEnable		= 0;
		ipropsapiCtrl.OnSearchExCBEnable	= 0;
		ipropsapiCtrl.OnPlayStatusCBEnable	= 0;
		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
		
		RetValue.value = ipropsapiCtrl.Open();
		
		lChannel = 1;
		lBlockmode = 0;

		//Setup to StartLive
		Channel = 1;
		lBlockmode = 0;
		if(RetValue.value > -1){
			RetValue.value = ipropsapiCtrl.PlayLive(lChannel, lBlockmode)
			if(RetValue.value > -1){
				PlayStatus = 1;
			}
		}
		else{
			return ;
		}
	}
	
	/****************************************************************
	* Function Name        : Unload
	* Overview             : 
	****************************************************************/
	function Unload()
	{
		if(PlayStatus == 1){
			//Stop CameraOperation
			lChannel	= 1;
			lCommand	= 0;
			ldata		= 0;
			lBlockmode	= 0;
			RetValue.value = ipropsapiCtrl.CameraOperation(lChannel, lCommand, ldata, lBlockmode);

			//Stop Live
			lCommand = 1;
			lSpeed = 1;
			lBlockmode = 0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lSpeed, lBlockmode);

			//Close connection to the device
			ipropsapiCtrl.Close();

			//Clear Image
			ipropsapiCtrl.ClearImage();
		}

		//Set properties for event
		ipropsapiCtrl.OnErrorEnable			= 0;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 0;
		ipropsapiCtrl.OnImageRefreshEnable	= 0;
		ipropsapiCtrl.OnRecordStatusEnable	= 0;
		ipropsapiCtrl.OnOpStatusEnable		= 0;
		ipropsapiCtrl.OnAlmStatusEnable		= 0;
		
		ipropsapiCtrl.OnRecStatusCBEnable	= 0;
		ipropsapiCtrl.OnSearchCBEnable		= 0;
		ipropsapiCtrl.OnSearchExCBEnable	= 0;
		ipropsapiCtrl.OnPlayStatusCBEnable	= 0;
		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
	}

	/****************************************************************
	* Function Name   : GetCameraPosition
	* Overview        : Get position of camera 
	****************************************************************/
	function GetCameraPosition()
	{
		if(PlayStatus == 1){
			//GetCameraPosition
			lChannel	= 1;
			lPan		= 0;
			lTilt		= 0;
			lZoom		= 0;
			lFocus		= 0;
			RetValue.value = ipropsapiCtrl.GetCameraPosition(lChannel);
			alert("GetCameraPosition Pan[" + ipropsapiCtrl.CameraPosPan + "] Tilt["+ ipropsapiCtrl.CameraPosTilt + "] Zoom["+ ipropsapiCtrl.CameraPosZoom + "] Focus["+ ipropsapiCtrl.CameraPosFocus + "]");
		}else{
			alert("No live.");
		}
	}
