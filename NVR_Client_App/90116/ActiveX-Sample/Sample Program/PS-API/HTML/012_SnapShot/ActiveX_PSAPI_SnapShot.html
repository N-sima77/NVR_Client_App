<SCRIPT language="JavaScript">
	/****************************************************************
	* Difinition
	****************************************************************/
	var PlayStatus = 0;

	/****************************************************************
	* Function Name        : Load
	* Overview             : Set properties
	****************************************************************/
	function Load()
	{
		//Set properties to connect the device
		ipropsapiCtrl.IPAddr		= "192.168.0.10";
		ipropsapiCtrl.DeviceType	= 2;
		ipropsapiCtrl.HttpPort		= 80;
		ipropsapiCtrl.UserName		= "admin";
		ipropsapiCtrl.Password		= "12345";
		
		//Set properties for display area
		ipropsapiCtrl.StreamFormat		= 0;
		ipropsapiCtrl.JPEGResolution	= 640;
		ipropsapiCtrl.MPEG4Resolution	= 640;
		ipropsapiCtrl.H264Resolution	= 640;
		
		//Set properties for event
		ipropsapiCtrl.OnErrorEnable			= 1;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 1;
		ipropsapiCtrl.OnImageRefreshEnable	= 0;
		ipropsapiCtrl.OnRecordStatusEnable	= 0;
		ipropsapiCtrl.OnOpStatusEnable		= 0;
		ipropsapiCtrl.OnAlmStatusEnable		= 0;
		
		ipropsapiCtrl.OnRecStatusCBEnable	= 0;
		ipropsapiCtrl.OnSearchCBEnable		= 0;
		ipropsapiCtrl.OnSearchExCBEnable	= 0;
		ipropsapiCtrl.OnPlayStatusCBEnable	= 0;
		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
		
		RetValue.value = ipropsapiCtrl.Open();
		
		lChannel = 1;
		lBlockmode = 0;

		//Setup to StartLive
		lChannel = 1;
		lBlockmode = 0;
		if(RetValue.value > -1){
			RetValue.value = ipropsapiCtrl.PlayLive(lChannel, lBlockmode)
			if(RetValue.value > -1){
				PlayStatus = 1;
			}
		}
		else{
			return ;
		}
	}
	
	/****************************************************************
	* Function Name        : Unload
	* Overview             : 
	****************************************************************/
	function Unload()
	{
		if(PlayStatus == 1){
			//Stop Live
			lCommand = 1;
			lSpeed = 1;
			lBlockmode = 0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lSpeed, lBlockmode);

			//Close connection to the device
			ipropsapiCtrl.Close();

			//Clear Image
			ipropsapiCtrl.ClearImage();
		}

		//Set properties for event
		ipropsapiCtrl.OnErrorEnable			= 0;
		ipropsapiCtrl.OnDevStatusEnable		= 0;
		ipropsapiCtrl.OnRecStatusEnable		= 0;
		ipropsapiCtrl.OnPlayStatusEnable	= 0;
		ipropsapiCtrl.OnImageRefreshEnable	= 0;
		ipropsapiCtrl.OnRecordStatusEnable	= 0;
		ipropsapiCtrl.OnOpStatusEnable		= 0;
		ipropsapiCtrl.OnAlmStatusEnable		= 0;
		
		ipropsapiCtrl.OnRecStatusCBEnable	= 0;
		ipropsapiCtrl.OnSearchCBEnable		= 0;
		ipropsapiCtrl.OnSearchExCBEnable	= 0;
		ipropsapiCtrl.OnPlayStatusCBEnable	= 0;
		ipropsapiCtrl.OnOpStatusCBEnable	= 0;
		ipropsapiCtrl.OnAlmStatusCBEnable	= 0;
		ipropsapiCtrl.OnFtpStatusCBEnable	= 0;
	}

	/****************************************************************
	* Function Name   : ShowResult

	}

<SCRIPT language="JavaScript">
	/****************************************************************
	* Function Name        : JpegSnapShot
	* Overview             : Store Jpeg format file
	****************************************************************/
	function JpegSnapShot()
	{
		if(PlayStatus == 1){
			RetValue.value = ipropsapiCtrl.SaveJpegImage(m_fName.value);
		}else{
			alert("No live.");
		}
	}
	
	/****************************************************************
	* Function Name        : DigitalZoom1
	* Overview             : Digital zoom x1
	****************************************************************/
	function DigitalZoom1()
	{
		if(PlayStatus == 1){
			//Digital zoom (x1)
			ipropsapiCtrl.DigitalZoom = 10;
		}else{
			alert("No live.");
		}
	}

	/****************************************************************
	* Function Name        : DigitalZoom4
	* Overview             : Digital zoom x4
	****************************************************************/
	function DigitalZoom4()
	{
		if(PlayStatus == 1){
			//Digital zoom (x4)
			ipropsapiCtrl.DigitalZoom = 40;
		}else{
			alert("No live.");
		}
	}

	/****************************************************************
	* Function Name        : DzMoveLeft
	* Overview             : Digital zoom move to left
	****************************************************************/
	function DzMoveLeft()
	{
		if(PlayStatus == 1){
			//Digital zoom move to left
			lXposition = -320
			lYposition = 0
			RetValue.value = ipropsapiCtrl.DigitalZoomMove(lXposition, lYposition);
		}else{
			alert("No live.");
		}
	}

	/****************************************************************
	* Function Name        : DzMoveRight
	* Overview             : Digital zoom move to right
	****************************************************************/
	function DzMoveRight()
	{
		if(PlayStatus == 1){
			//Digital zoom move to right
			lXposition = 320
			lYposition = 0
			RetValue.value = ipropsapiCtrl.DigitalZoomMove(lXposition, lYposition);
		}else{
			alert("No live.");
		}
	}
