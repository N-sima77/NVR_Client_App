<SCRIPT language="JavaScript">
	/****************************************************************
	* Function Name   : Stop
	* Overview        : Stop the playback local file
	****************************************************************/
	function Stop()
	{
		if(PlayStatus == 1){
			//Stop
			lCommand	=	2;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);

			if(RetValue.value == 0){
				PlayStatus = 0;
			}

			//Clear Image
			ipropsapiCtrl.ClearImage();
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : Pause
	* Overview        : Pause the playback
	****************************************************************/
	function Pause()
	{
		if(PlayStatus == 1){
			//Pause
			lCommand	=	3;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : PlayBack
	* Overview        : Start playback through local file
	****************************************************************/
	function PlayBack()
	{
		if(PlayStatus == 0){
			//Set N3R file password
			ipropsapiCtrl.FilePassword = ""
			
			//Start Playback
			lBlocking	= 0;
			RetValue.value = ipropsapiCtrl.PlayFile(FName.value , lBlocking);

			if(RetValue.value == 0){
				PlayStatus = 1;
			}
		}else{
			//Re-Start Playback
			lCommand	=	4;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}
	}

	/****************************************************************
	* Function Name   : Reverse
	* Overview        : Start rewind playback
	****************************************************************/
	function Reverse()
	{
		if(PlayStatus == 1){
			//Backward
			lCommand	=	5;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : NextFrame
	* Overview        : Show the next frame
	****************************************************************/
	function NextFrame()
	{
		if(PlayStatus == 1){
			//Next Frame
			lCommand	=	6;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : PrevFrame
	* Overview        : Show the previous image
	****************************************************************/
	function PrevFrame()
	{
		if(PlayStatus == 1){
			//Previous Frame
			lCommand	=	7;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : FF
	* Overview        : Start fast playback
	****************************************************************/
	function FF()
	{
		if(PlayStatus == 1){
			//Fast Forward
			lCommand	=	8;
			lspeed		=	1;
			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{
			alert("No playback.");
		}
	}

	/****************************************************************
	* Function Name   : Rewind
	* Overview        : Start fast rewind playback
	****************************************************************/
	function Rewind()
	{
		if(PlayStatus == 1){
			//Rewind
			lCommand	=	9;

			lBlocking	=	0;
			RetValue.value = ipropsapiCtrl.PlayControl(lCommand, lspeed, lBlocking);
		}else{

		}
