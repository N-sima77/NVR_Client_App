/****************************************************************
* Definition
****************************************************************/
var m_PlayStatus;
var constStart = 0;
var constLive = 1;
/****************************************************************
 * Function			: Load
 * Outline			: 
 ****************************************************************/
function Load()
{
	confirm("Please confirm beforehand that the internet mode of a target device is turned ON.");

	m_PlayStatus = constStart;

	//*****************************************************
	// Set properties (ActiveX)
	//*****************************************************
	// Set properties to connect the device
	ipropsapiCtrl.IPAddr = "192.168.0.10";
	ipropsapiCtrl.DeviceType = 2;
	ipropsapiCtrl.HttpPort = 80;
	ipropsapiCtrl.UserName = "admin";
	ipropsapiCtrl.Password = "admin12345";
	
	// Set properties for event
	ipropsapiCtrl.OnErrorEnable = 1;
	ipropsapiCtrl.OnDevStatusEnable = 0;
	ipropsapiCtrl.OnRecStatusEnable = 0;
	ipropsapiCtrl.OnPlayStatusEnable = 1;
	ipropsapiCtrl.OnImageRefreshEnable = 0;
	ipropsapiCtrl.OnRecordStatusEnable = 0;
	ipropsapiCtrl.OnOpStatusEnable = 0;
	ipropsapiCtrl.OnAlmStatusEnable = 0;
	ipropsapiCtrl.OnRecStatusCBEnable = 0;
	ipropsapiCtrl.OnSearchCBEnable = 0;
	ipropsapiCtrl.OnSearchExCBEnable = 0;
	ipropsapiCtrl.OnPlayStatusCBEnable = 0;
	ipropsapiCtrl.OnOpStatusCBEnable = 0;
	ipropsapiCtrl.OnAlmStatusCBEnable = 0;
	ipropsapiCtrl.OnFtpStatusCBEnable = 0;
	
	// Set Initial status
	ipropsapiCtrl.StreamFormat = 3;		// H.264
	ipropsapiCtrl.JPEGResolution = 640;
	ipropsapiCtrl.MPEG4Resolution = 640;
	ipropsapiCtrl.H264Resolution = 640;
	ipropsapiCtrl.PictureFitMode = 0;

	ipropsapiCtrl.ClearImage();

	// Connect to device
	ipropsapiCtrl.Open();


	//*****************************************************
	//Set parameters (Others)
	//*****************************************************
	document.getElementById("RetValue").value = "";
	document.getElementById("EventLog").value = "";
	
}

/****************************************************************
 * Function			: UnLoad
 * Outline			: 
 ****************************************************************/
function UnLoad()
{
	// Check the play status
	if (m_PlayStatus == constLive) {
		OnClickedLiveEnd();
	}

	//*****************************************************
	// Set properties (ActiveX)
	//*****************************************************
	// Close connecntion to the device
	ipropsapiCtrl.Close();
	Logging("[Funcion] Close");

	// Set properties for event
	ipropsapiCtrl.OnErrorEnable = 0;
	ipropsapiCtrl.OnPlayStatusEnable = 0;
}

/****************************************************************
 * Function			: OnClickedLiveStart
 * Outline			: Start live video play
 ****************************************************************/
function OnClickedLiveStart()
{
	var Ret, Channel, Blockmode;

	// Check the play status
	if (m_PlayStatus == constStart) {
		// Start Live
		Channel = 1;	// Network camera
		Blockmode = 0;	// Blocking
		Ret = ipropsapiCtrl.Playlive(Channel, Blockmode);
		Logging("[Function] PlayLive(Start):" + Ret.toString());
		if (Ret == 0) {
			m_PlayStatus = constLive;
		}
		else {
			ipropsapiCtrl.Close();
		}
	}
	else {
		Logging("[Message] In the live.");
	}
}

/****************************************************************
 * Function			: OnClickedLiveEnd
 * Outline			: Stop live video play
 ****************************************************************/
function OnClickedLiveEnd()
{
	var Ret, Command, Speed, Blockmode;
	
	// Check the play status
    if (m_PlayStatus == constLive) {
        // Stop Live
        Command = 1;         // Stop live
        Speed = 1;           // Step 1
        Blockmode = 0;       // Blocking
        Ret = ipropsapiCtrl.PlayControl(Command, Speed, Blockmode);
        Logging("[Function] PlayLive(Stop):" + Ret.toString());
        //Clear Image;
        ipropsapiCtrl.ClearImage();
        m_PlayStatus = constStart;
    }
    else {
        Logging("[Message] No live.");
    }
}

/****************************************************************
 * Function			: OnClickedInternetMode
 * Outline			: Change InternetMode
 ****************************************************************/
function OnClickedInternetMode()
{
	var Ret, Channel, Command;

	// Check the play status
	if (m_PlayStatus == constStart) {
		Channel = 1;	// Network Camera
		if (!isFinite(parseInt(document.getElementById("ModeValue").value, 10))) return;
		Command = parseInt(document.getElementById("ModeValue").value, 10);
		if (Command != 0 && Command != 1) return;
		Ret = ipropsapiCtrl.SetInternetModeCam(Channel, Command,
							ipropsapiCtrl.StreamFormat, ipropsapiCtrl.StreamNumber);
		Logging("[Function] SetInternetModeCam(SetMode=" + Command.toString() + "):" + Ret.toString());
		ipropsapiCtrl.InternetMode = Command;
		Logging("[Property] InternetMode:" + ipropsapiCtrl.InternetMode.toString());
	}
	else {
		Logging("[Message] In the live.");
	}
}

/****************************************************************
 * Function			: Logging
 * Outline			: 
****************************************************************/
function Logging(strLog)
{
	//*****************************************************
	// Imprementation to add item to list
	//*****************************************************
	var strBuf = document.getElementById("EventLog").value ;
	if ( strBuf != ""){
		strBuf = strBuf + "\n";
	}
	document.getElementById("EventLog").value = strBuf + strLog;
}
