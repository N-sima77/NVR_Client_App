/****************************************************************
* Definition
****************************************************************/
var m_Status;

/****************************************************************
 * Function			: onLoad
 * Outline			: 
 ****************************************************************/
function onLoad()
{
	//*****************************************************
	// HTML load
	//*****************************************************
	pslookupctrl.OnDevLookupEnable = 0;
	Logging("[Property] OnDevLookupEnable:=Off");
	pslookupctrl.OnErrorEnable = 1;
	m_Status = 0;
	document.getElementById("EventLog").value = "";
}

/****************************************************************
 * Function			: UnLoad
 * Outline			: 
 ****************************************************************/
function UnLoad()
{
	//*****************************************************
	// HTML unload
	//*****************************************************
	pslookupctrl.OnDevLookupEnable = 0;
	pslookupctrl.OnErrorEnable = 1;
}

/****************************************************************
 * Function			: Logging
 * Outline			: 
****************************************************************/
function Logging(strLog)
{
	//*****************************************************
	// Imprementation to add item to list
	//*****************************************************
	var strBuf = document.getElementById("EventLog").value ;
	if ( strBuf != ""){
		strBuf = strBuf + "\n";
	}
	document.getElementById("EventLog").value = strBuf + strLog;
	
}

/****************************************************************
 * Function			: onClickedSearch
 * Outline			: 
****************************************************************/
function onClickedSearch()
{
	//*****************************************************
	// Switching the camera searches
	//*****************************************************
	if (m_Status == 0) {
		document.getElementById("btnSearch").value = "End";
		m_Status = 1;
		pslookupctrl.OnDevLookupEnable = 1;
		Logging("[Property] OnDevLookupEnable:=On");
	}
	else {
		document.getElementById("btnSearch").value = "Start";
		m_Status = 0;
		pslookupctrl.OnDevLookupEnable = 0;
		Logging("[Property] OnDevLookupEnable:=Off");
	}
}
